name: Design proposal
description: Propose a product, API, networking, provider, or security change.
title: "design: "
labels: [design]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem independently of a preferred solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: invariants
    attributes:
      label: Security and fail-closed impact
      description: Explain how the non-negotiable invariants are preserved.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance tests
    validations:
      required: true
