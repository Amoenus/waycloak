---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: waycloak-manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - namespaces
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - get
  - update
- apiGroups:
  - networking.waycloak.io
  resources:
  - portforwardleases
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.waycloak.io
  resources:
  - portforwardleases/status
  - vpngateways/status
  - vpnworkloads/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - networking.waycloak.io
  resources:
  - vpngateways
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.waycloak.io
  resources:
  - vpnworkloads
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.waycloak.io
  resources:
  - vpnworkloads/finalizers
  verbs:
  - update
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
