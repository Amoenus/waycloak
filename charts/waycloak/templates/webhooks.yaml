{{- $caBundle := required "webhook.tls.caBundle is required" .Values.webhook.tls.caBundle -}}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "waycloak.fullname" . }}
  labels:
    {{- include "waycloak.labels" . | nindent 4 }}
webhooks:
  - name: mpod.networking.waycloak.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    reinvocationPolicy: IfNeeded
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
    matchPolicy: Equivalent
    matchConditions:
      - name: opted-in
        expression: >-
          has(object.metadata.annotations) &&
          'networking.waycloak.io/gateway' in object.metadata.annotations
    clientConfig:
      caBundle: {{ $caBundle | quote }}
      service:
        name: {{ include "waycloak.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /mutate-v1-pod
        port: 443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: "Namespaced"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "waycloak.fullname" . }}
  labels:
    {{- include "waycloak.labels" . | nindent 4 }}
webhooks:
  - name: vpod.networking.waycloak.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
    matchPolicy: Equivalent
    matchConditions:
      - name: opted-in
        expression: >-
          has(object.metadata.annotations) &&
          'networking.waycloak.io/gateway' in object.metadata.annotations
    clientConfig:
      caBundle: {{ $caBundle | quote }}
      service:
        name: {{ include "waycloak.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-v1-pod
        port: 443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: "Namespaced"
