{{- $certManagerEnabled := .Values.webhook.tls.certManager.enabled -}}
{{- $caBundle := .Values.webhook.tls.caBundle -}}
{{- if and (not $certManagerEnabled) (not $caBundle) -}}
{{- fail "webhook.tls.caBundle is required when webhook.tls.certManager.enabled is false" -}}
{{- end -}}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "waycloak.fullname" . }}
  {{- if $certManagerEnabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ printf "%s/%s" .Release.Namespace (include "waycloak.webhookCertificateName" .) | quote }}
  {{- end }}
  labels:
    {{- include "waycloak.labels" . | nindent 4 }}
webhooks:
  - name: mpod.networking.waycloak.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    reinvocationPolicy: IfNeeded
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
    matchPolicy: Equivalent
    matchConditions:
      - name: opted-in
        expression: >-
          has(object.metadata.annotations) &&
          'networking.waycloak.io/gateway' in object.metadata.annotations
    clientConfig:
      {{- if $caBundle }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}
      service:
        name: {{ include "waycloak.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /mutate-v1-pod
        port: 443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: "Namespaced"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "waycloak.fullname" . }}
  {{- if $certManagerEnabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ printf "%s/%s" .Release.Namespace (include "waycloak.webhookCertificateName" .) | quote }}
  {{- end }}
  labels:
    {{- include "waycloak.labels" . | nindent 4 }}
webhooks:
  - name: vpod.networking.waycloak.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
    matchPolicy: Equivalent
    matchConditions:
      - name: opted-in
        expression: >-
          has(object.metadata.annotations) &&
          'networking.waycloak.io/gateway' in object.metadata.annotations
    clientConfig:
      {{- if $caBundle }}
      caBundle: {{ $caBundle | quote }}
      {{- end }}
      service:
        name: {{ include "waycloak.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-v1-pod
        port: 443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: "Namespaced"
