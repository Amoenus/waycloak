{{- $generatedRole := .Files.Get "files/manager-role.yaml" | fromYaml -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "waycloak.fullname" . }}
  labels:
    {{- include "waycloak.labels" . | nindent 4 }}
rules:
  {{- toYaml $generatedRole.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "waycloak.fullname" . }}
  labels:
    {{- include "waycloak.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "waycloak.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "waycloak.fullname" . }}
    namespace: {{ .Release.Namespace }}
