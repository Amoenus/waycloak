{{- $controllerImage := include "waycloak.image" (dict "name" "controller" "image" .Values.images.controller) -}}
{{- $agentImage := include "waycloak.image" (dict "name" "agent" "image" .Values.images.agent) -}}
{{- $gatewayManagerImage := include "waycloak.image" (dict "name" "gatewayManager" "image" .Values.images.gatewayManager) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "waycloak.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "waycloak.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "waycloak.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "waycloak.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "waycloak.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: {{ $controllerImage }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          args:
            - --agent-image={{ $agentImage }}
            - --gateway-manager-image={{ $gatewayManagerImage }}
            - --webhook-cert-dir=/var/run/waycloak/webhook-certs
            - --allocation-quarantine={{ .Values.allocationQuarantine }}
            - --leader-elect=true
          ports:
            - name: webhook
              containerPort: 9443
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 10
            timeoutSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /var/run/waycloak/webhook-certs
              readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ include "waycloak.webhookSecretName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "waycloak.selectorLabels" . | nindent 20 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
