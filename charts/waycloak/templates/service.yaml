apiVersion: v1
kind: Service
metadata:
  name: {{ include "waycloak.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "waycloak.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "waycloak.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: 443
      targetPort: webhook
      protocol: TCP
