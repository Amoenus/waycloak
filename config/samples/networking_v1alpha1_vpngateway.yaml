apiVersion: v1
kind: ConfigMap
metadata:
  name: gluetun-native
  namespace: waycloak-egress
data:
  VPN_SERVICE_PROVIDER: custom
  VPN_TYPE: wireguard
---
apiVersion: networking.waycloak.io/v1alpha1
kind: VPNGateway
metadata:
  name: example
  namespace: waycloak-egress
spec:
  engine:
    type: Gluetun
    image: docker.io/qmcgaw/gluetun:v3.41.0@sha256:6b54856716d0de56e5bb00a77029b0adea57284cf5a466f23aad5979257d3045
    config:
      envFrom:
        - name: gluetun-native
      files:
        - secretRef:
            name: wireguard-config
          mountPath: /gluetun/wireguard
  overlay:
    cidr: 172.30.99.0/24
    vni: 7999
    mtu: 1320
  workloadAccess:
    namespaceSelector:
      matchLabels:
        networking.waycloak.io/access: allowed
