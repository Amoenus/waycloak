---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: workloadadapters.networking.waycloak.io
spec:
  group: networking.waycloak.io
  names:
    kind: WorkloadAdapter
    listKind: WorkloadAdapterList
    plural: workloadadapters
    shortNames:
    - wcadapter
    singular: workloadadapter
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.protocolVersion
      name: Protocol
      type: string
    - jsonPath: .spec.image
      name: Image
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          WorkloadAdapter is cluster-scoped operator trust policy, not a workload
          execution request. Creating one asserts that the referenced digest and its
          supply-chain evidence have been reviewed by the cluster operator.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              WorkloadAdapterSpec is an operator-approved adapter identity. Workloads
              select this object by name; the admission webhook only accepts an existing
              sidecar whose immutable image and protocol version exactly match it.
            properties:
              image:
                description: Image must be an immutable OCI manifest or index reference.
                pattern: ^[^\s@]+@sha256:[a-f0-9]{64}$
                type: string
              protocolVersion:
                description: |-
                  ProtocolVersion is the public Pod-local adapter protocol implemented by
                  the image.
                enum:
