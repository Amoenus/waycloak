apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: waycloak-qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent
      annotations:
        networking.waycloak.io/gateway: waycloak-system/private-egress
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: configure-waycloak-adapter
          image: lscr.io/linuxserver/qbittorrent:5.2.3@sha256:352371a7242e8b4aa10958ca02076d1023758070519b89a10251475fb9f1a35a
          command: [/bin/sh, -ec]
          args:
            - |
              install -d /config/qBittorrent
              if [ ! -s /config/qBittorrent/qBittorrent.conf ]; then
                cp /bootstrap/qBittorrent.conf /config/qBittorrent/qBittorrent.conf
              fi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: bootstrap
              mountPath: /bootstrap
              readOnly: true
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.2.3@sha256:352371a7242e8b4aa10958ca02076d1023758070519b89a10251475fb9f1a35a
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Etc/UTC
            - name: WEBUI_PORT
              value: "8080"
          ports:
            - name: bittorrent-tcp
              containerPort: 6881
              protocol: TCP
            - name: bittorrent-udp
              containerPort: 6881
              protocol: UDP
            - name: webui
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: webui
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
        - name: waycloak-qbittorrent-adapter
          image: ghcr.io/amoenus/waycloak-qbittorrent-adapter:0.2.0-alpha.1
          env:
            - name: WAYCLOAK_QBITTORRENT_API_KEY_FILE
              value: /adapter-auth/api-key
            - name: WAYCLOAK_LEASE_NAME
              value: qbittorrent
          readinessProbe:
            exec:
              command: [/ko-app/qbittorrent-adapter, probe]
            periodSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: adapter-auth
              mountPath: /adapter-auth
              readOnly: true
      volumes:
        - name: bootstrap
          secret:
            secretName: qbittorrent-adapter-auth
            items:
              - key: qBittorrent.conf
                path: qBittorrent.conf
        - name: adapter-auth
          secret:
            secretName: qbittorrent-adapter-auth
            items:
              - key: api-key
                path: api-key
        - name: config
          emptyDir: {}
        - name: downloads
          emptyDir: {}
